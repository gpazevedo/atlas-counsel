[project]
name = "atlas-counsel"
version = "0.1.0"
description = "Citation-grounded agentic RAG over a synthetic procurement corpus."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.6"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
atlas-corpus = "atlas_counsel.corpus.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atlas_counsel"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
