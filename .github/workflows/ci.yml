name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        # setup-uv v8+ is immutable: moving tags (@v8) no longer resolve,
        # so this must pin a full version. Bump to the newest v8.x as released.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra service --extra qdrant

      - name: Run tests
        run: uv run pytest
